spring.application.name=${SPRING_APPLICATION_NAME:ftgo-application}

spring.jpa.generate-ddl=${SPRING_JPA_GENERATE_DDL:false}
logging.level.org.springframework.orm.jpa=${LOGGING_LEVEL_JPA:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:INFO}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost/ftgo?useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mysqluser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysqlpw}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS:health,info,metrics}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
